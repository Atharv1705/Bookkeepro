<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BookKeepPro | User Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/components.css"/>
<link rel="stylesheet" href="/css/animations.css"/>
<link rel="stylesheet" href="/css/chatbot.css"/>
<style>
.approval-row {
  display:flex; align-items:flex-start; gap:16px;
  padding:14px 0; border-bottom:1px solid var(--border);
}
.approval-row:last-child { border-bottom:none; }
.ar-left  { flex:1; min-width:0; }
.ar-name  { font-weight:600; font-size:13px; color:var(--navy); }
.ar-type  { font-size:12px; color:var(--muted); margin-top:2px; }
.ar-note  { font-size:12px; color:var(--warn); margin-top:3px; }
.ar-right { display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }
.chk-approve { accent-color:var(--success); width:16px; height:16px; cursor:pointer; }
.chk-reject  { accent-color:var(--error);   width:16px; height:16px; cursor:pointer; }
.chk-label   { font-size:12px; font-weight:600; cursor:pointer; }
.panel-item  { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.panel-item:last-child { border-bottom:none; }
.pi-info  { flex:1; min-width:0; }
.pi-label { font-weight:600; font-size:13px; color:var(--navy); }
.pi-fname { font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>

  <style>html{height:100%;}</style>  <script src="/js/theme.js?v=2"></script>
</head>
<body class="app-body">

<header class="app-header">
  <img class="logo" src="/images/bookkeeppro-logo.webp" onclick="window.location.href='/admin-dashboard'" alt="BookKeepPro"/>
  <div class="header-actions">

      <!-- THEME TOGGLE -->
      <button class="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;color:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px;">
        <span class="material-symbols-outlined theme-toggle-icon" style="font-size:24px;">dark_mode</span>
      </button>
    <button class="btn btn-ghost btn-sm"     onclick="window.location.href='/admin-dashboard'">← Users</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/profile'">My Profile</button>
    <button class="btn btn-primary btn-sm"   onclick="logoutUser()">Logout</button>
  </div>
</header>

<main class="page-main-wide page-enter">

  <!-- User Info Bar -->
  <div class="card" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--header-bg),var(--blue-light));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:var(--navy);flex-shrink:0;" id="userAvatar">?</div>
        <div>
          <div style="font-weight:700;font-size:18px;color:var(--navy);" id="detailName">—</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;" id="detailEmail">—</div>
          <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
            <span class="badge badge-blue" id="detailRole">user</span>
            <span id="detailAck" class="badge badge-yellow"><span class="material-symbols-outlined">pending</span> Engagement not acknowledged</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <label class="form-label" style="margin:0;font-size:11px;">Tax Year</label>
          <select id="adminTaxYearSelect" class="select-input" style="width:auto;padding:6px 12px;font-size:13px;" onchange="onAdminYearChange()"></select>
        </div>

        <button class="btn btn-danger btn-sm" onclick="deleteUserCompletely()" style="border-radius:var(--radius-sm);">Delete User</button>
      </div>
    </div>
  </div>

  <!-- Engagement Box -->
  <div id="engagementBox" class="engagement-banner" style="display:none;margin-bottom:20px;">
    <div class="banner-icon"><span class="material-symbols-outlined">assignment</span></div>
    <div class="banner-text"><strong>General Engagement Form</strong><span>Submitted by the user</span></div>
    <button id="engagementViewBtn" class="btn btn-secondary btn-sm" style="border-radius:var(--radius-sm);">View</button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('personal',this)"><span class="material-symbols-outlined">description</span> Personal Docs</button>
    <button class="tab-btn"        onclick="switchTab('business',this)"><span class="material-symbols-outlined">business</span> Business Docs</button>
    <button class="tab-btn"        onclick="switchTab('returns', this)">📤 Returns for Review</button>
    <button class="tab-btn"        onclick="switchTab('audit',   this)"><span class="material-symbols-outlined">history</span> Audit Trail</button>
  </div>


  <!-- ── TAB: Personal ── -->
  <div id="tab-personal" class="tab-panel active">
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      <div style="flex:2;min-width:0;">
        <div class="card-flat">
          <div id="docTable"></div>
        </div>
      </div>
      <div style="flex:1;min-width:240px;">
        <div class="card-flat" style="display:flex;flex-direction:column;gap:16px;">
          <h3>Filing Timeline</h3>
          <div class="timeline-control">
            <button class="tl-btn" onclick="decPersonalTimeline()">−</button>
            <div>
              <div class="tl-value" id="personalTimelineValue">0</div>
              <div class="tl-label">days</div>
            </div>
            <button class="tl-btn" onclick="incPersonalTimeline()">+</button>
          </div>
          <button class="btn btn-secondary w-full" style="border-radius:var(--radius-sm);" onclick="sendPersonalMail()">
            Send Personal Approval Email
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: Business ── -->
  <div id="tab-business" class="tab-panel">
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      <div style="flex:2;min-width:0;">
        <div class="card-flat">
          <div id="businessDocTable"></div>
        </div>
      </div>
      <div style="flex:1;min-width:240px;">
        <div class="card-flat" style="display:flex;flex-direction:column;gap:16px;">
          <h3>Filing Timeline</h3>
          <div class="timeline-control">
            <button class="tl-btn" onclick="decBusinessTimeline()">−</button>
            <div>
              <div class="tl-value" id="businessTimelineValue">0</div>
              <div class="tl-label">days</div>
            </div>
            <button class="tl-btn" onclick="incBusinessTimeline()">+</button>
          </div>
          <button class="btn btn-secondary w-full" style="border-radius:var(--radius-sm);" onclick="sendBusinessMail()">
            Send Business Approval Email
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: Returns ── -->
  <div id="tab-returns" class="tab-panel">
    <div class="card-flat">
      <div class="flex-between" style="margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <h3>Admin-Uploaded Returns</h3>
        <div style="display:flex;gap:10px;">
          <label class="btn btn-secondary btn-sm" for="adminDocInput" tabindex="0" id="adminUploadLabel" style="border-radius:var(--radius-sm);cursor:pointer;">
            <span id="adminUploadBtnText">+ Upload Document</span>
            <input type="file" id="adminDocInput" hidden accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx"/>
          </label>
          <button class="btn btn-sm" style="background:var(--success-bg);color:var(--success);border:1px solid #a5d6a7;border-radius:var(--radius-sm);" onclick="submitDocumentsForReview()">
            Submit for Review
          </button>
        </div>
      </div>
      <div id="docPanel"></div>
    </div>
  </div>

  <!-- ── TAB: Audit ── -->
  <div id="tab-audit" class="tab-panel">
    <div class="card-flat">
      <h3 style="margin-bottom:16px;">Audit Trail</h3>
      <div id="auditLog">
        <div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">history</span></div><div class="empty-title">Loading audit log…</div></div>
      </div>
    </div>
  </div>

</main>

<footer class="app-footer">
  <img src="/images/bookkeeppro-logo.webp" alt="BookKeepPro"/>
  <small>© 2026 Bookkeeping Business Solutions</small>
</footer>


<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/spinner.js"></script>
<script src="/js/confirm-modal.js"></script>
<script>
/* ── Globals ── */
const params  = new URLSearchParams(window.location.search);
const userId  = params.get("user_id");
const STATE_KEY = `review_state_${userId}`;
const token   = localStorage.getItem("token");
const role    = localStorage.getItem("role");
if (!token || (role !== "admin" && role !== "super_admin") || !userId) { localStorage.clear(); window.location.href="/login"; }
initSessionWarning();


/* ── Tab switching ── */
function switchTab(name, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${name}`).classList.add("active");
  btn.classList.add("active");
  if (name === "audit" && !auditLoaded) loadAuditLog();
}

/* ── State ── */
const personalReviewState = {}, businessReviewState = {};
let personalTimeline = 0, businessTimeline = 0;
let auditLoaded = false;

function loadSavedState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STATE_KEY)||"{}");
    Object.assign(personalReviewState, saved.personal||{});
    Object.assign(businessReviewState, saved.business||{});
  } catch(e) {}
}
function _saveLocalState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({personal:personalReviewState,business:businessReviewState}));
}

/* ── Year ── */
function getAdminSelectedYear() { return document.getElementById("adminTaxYearSelect")?.value||""; }
function onAdminYearChange() {
  localStorage.setItem("admin_selected_tax_year", getAdminSelectedYear());
  loadUserDetails();
}

/* ── Load user + docs ── */
async function loadUserDetails() {
  showSpinner(document.getElementById("docTable"));
  showSpinner(document.getElementById("businessDocTable"));
  const year = getAdminSelectedYear();
  const url  = year ? `/api/upload/admin/users/${userId}/documents?tax_year=${year}` : `/api/upload/admin/users/${userId}/documents`;
  const res  = await authFetch(url);
  if (!res) return;
  if (res.status === 403) { showToast("Access denied","error"); window.location.href="/admin-dashboard"; return; }
  if (!res.ok) { showToast("Failed to load user documents","error"); return; }
  const { user={}, documents=[] } = await res.json();
  const viewerRole = localStorage.getItem("role");
  if (viewerRole === "admin" && user.role && user.role !== "user") { showToast("Access denied","error"); window.location.href="/admin-dashboard"; return; }

  /* User info */
  document.getElementById("detailName").textContent  = user.name  || "—";
  document.getElementById("detailEmail").textContent = user.email || "—";
  document.getElementById("userAvatar").textContent  = (user.name||"U").charAt(0).toUpperCase();
  const roleBadge = document.getElementById("detailRole");
  roleBadge.textContent = user.role || "user";
  roleBadge.className   = `badge badge-${user.role==="super_admin"?"red":user.role==="admin"?"orange":"blue"}`;
  const ackEl = document.getElementById("detailAck");
  if (user.role === "super_admin") {
    ackEl.style.display = "none";
    const delBtn = document.querySelector("button[onclick='deleteUserCompletely()']");
    if (delBtn) delBtn.style.display = "none";
  } else {
    ackEl.style.display = "";
    const delBtn = document.querySelector("button[onclick='deleteUserCompletely()']");
    if (delBtn) delBtn.style.display = "";
    if (user.engagement_acknowledged_at) {
      ackEl.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Acknowledged ${new Date(user.engagement_acknowledged_at).toLocaleDateString()}`;
      ackEl.className   = "badge badge-green";
    } else {
      ackEl.innerHTML = `<span class="material-symbols-outlined">warning</span> Not acknowledged`; ackEl.className = "badge badge-yellow";
    }
  }

  /* Docs */
  const docTable = document.getElementById("docTable");
  const bizTable = document.getElementById("businessDocTable");
  docTable.innerHTML=""; bizTable.innerHTML="";
  document.getElementById("engagementBox").style.display="none";
  const personal=[], business=[];
  documents.forEach(d => {
    if (d.doc_type?.toLowerCase().includes("engagement")) {
      document.getElementById("engagementBox").style.display="flex";
      document.getElementById("engagementViewBtn").onclick = () =>
        authFetch(`/api/upload/view-url?key=${encodeURIComponent(d.storage_key)}`).then(r=>r&&r.json()).then(x=>x&&window.open(x.url,"_blank")).catch(()=>showToast("Could not generate view link","error"));
      return;
    }
    if (d.table==="personal") personal.push(d);
    if (d.table==="business") business.push(d);
  });


  if (!personal.length) docTable.innerHTML=`<div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">inbox</span></div><div class="empty-title">No personal documents</div></div>`;
  else personal.forEach((d,i) => renderRow(d,i,docTable,personalReviewState,updatePersonalState));
  if (!business.length) bizTable.innerHTML=`<div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">inbox</span></div><div class="empty-title">No business documents</div></div>`;
  else business.forEach((d,i) => renderRow(d,i,bizTable,businessReviewState,updateBusinessState));
}

/* ── Row Render ── */
function renderRow(doc, index, container, stateStore, updateFn) {
  const dbStatus = doc.review_status || "pending";
  const state    = { status: dbStatus !== "pending" ? dbStatus : (stateStore[doc.storage_key]?.status||"") };
  const row      = document.createElement("div"); row.className="approval-row";

  const left = document.createElement("div"); left.className="ar-left";
  const nameEl = document.createElement("div"); nameEl.className="ar-name"; nameEl.textContent=`${index+1}. ${doc.filename}`;
  const typeEl = document.createElement("div"); typeEl.className="ar-type"; typeEl.textContent=doc.doc_type||"";
  const badgeEl= document.createElement("span");
  badgeEl.id = `badge_${doc.id}`;
  badgeEl.className = dbStatus==="approved"?"badge badge-green":dbStatus==="rejected"?"badge badge-red":"badge badge-yellow";
  badgeEl.innerHTML = dbStatus==="approved"?`<span class="material-symbols-outlined">check</span> Approved`:dbStatus==="rejected"?`<span class="material-symbols-outlined">close</span> Rejected`:`<span class="material-symbols-outlined">pending</span> Pending`;
  left.appendChild(nameEl); left.appendChild(typeEl); left.appendChild(badgeEl);
  if (doc.review_note) { const n=document.createElement("div"); n.className="ar-note"; n.textContent=`Note: ${doc.review_note}`; left.appendChild(n); }

  const right = document.createElement("div"); right.className="ar-right";
  const viewBtn = document.createElement("button"); viewBtn.className="btn btn-secondary btn-xs"; viewBtn.style.borderRadius="var(--radius-sm)"; viewBtn.textContent="View";
  viewBtn.onclick = () => authFetch(`/api/upload/view-url?key=${encodeURIComponent(doc.storage_key)}`).then(r=>r&&r.json()).then(d=>d&&window.open(d.url,"_blank")).catch(()=>showToast("Could not generate view link","error"));

  const appChk = document.createElement("input"); appChk.type="checkbox"; appChk.className="chk-approve"; appChk.checked=(state.status==="approved"); appChk.id=`app_${doc.id}`;
  const appLbl = document.createElement("label"); appLbl.className="chk-label"; appLbl.htmlFor=`app_${doc.id}`; appLbl.style.color="var(--success)"; appLbl.textContent="Approve";
  const rejChk = document.createElement("input"); rejChk.type="checkbox"; rejChk.className="chk-reject";  rejChk.checked=(state.status==="rejected"); rejChk.id=`rej_${doc.id}`;
  const rejLbl = document.createElement("label"); rejLbl.className="chk-label"; rejLbl.htmlFor=`rej_${doc.id}`; rejLbl.style.color="var(--error)"; rejLbl.textContent="Reject";

  appChk.onchange = () => updateFn(doc, appChk, rejChk, "approved");
  rejChk.onchange = () => updateFn(doc, rejChk, appChk, "rejected");

  right.appendChild(viewBtn); right.appendChild(appChk); right.appendChild(appLbl); right.appendChild(rejChk); right.appendChild(rejLbl);
  row.appendChild(left); row.appendChild(right);
  container.appendChild(row);
}

async function persistReviewStatus(doc, status, note="") {
  const ep = doc.table==="personal" ? `/api/upload/personal-documents/${doc.id}/review-status` : `/api/upload/business-documents/${doc.id}/review-status`;
  const res = await authFetch(ep,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status,note})});
  if (!res||!res.ok){showToast("Failed to save review status","error");return false;}
  const badge=document.getElementById(`badge_${doc.id}`);
  if (badge){badge.className=status==="approved"?"badge badge-green":status==="rejected"?"badge badge-red":"badge badge-yellow";badge.innerHTML=status==="approved"?`<span class="material-symbols-outlined">check</span> Approved`:status==="rejected"?`<span class="material-symbols-outlined">close</span> Rejected`:`<span class="material-symbols-outlined">pending</span> Pending`;}
  return true;
}
function updatePersonalState(doc,active,other,status){if(active.checked){other.checked=false;personalReviewState[doc.storage_key]={status,name:doc.filename};persistReviewStatus(doc,status);}else{delete personalReviewState[doc.storage_key];persistReviewStatus(doc,"pending");}_saveLocalState();}
function updateBusinessState(doc,active,other,status){if(active.checked){other.checked=false;businessReviewState[doc.storage_key]={status,name:doc.filename};persistReviewStatus(doc,status);}else{delete businessReviewState[doc.storage_key];persistReviewStatus(doc,"pending");}_saveLocalState();}
function extractDocs(state){const a=[],r=[];Object.values(state).forEach(d=>{if(d.status==="approved")a.push(d.name);if(d.status==="rejected")r.push(d.name);});return{approved:a,rejected:r};}

async function sendPersonalMail(){
  const {approved,rejected}=extractDocs(personalReviewState);
  if(!approved.length&&!rejected.length){showToast("No personal documents selected.","warning");return;}
  const res=await authFetch("/api/review/notify-user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:userId,type:"personal",approved,rejected,personal_timeline:personalTimeline,business_timeline:0})});
  if(!res) return;
  if(!res.ok){showToast("Failed to send personal email","error");return;}
  showToast("Personal approval email sent","success");
}
async function sendBusinessMail(){
  const {approved,rejected}=extractDocs(businessReviewState);
  if(!approved.length&&!rejected.length){showToast("No business documents selected.","warning");return;}
  const res=await authFetch("/api/review/notify-user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:userId,type:"business",approved,rejected,personal_timeline:0,business_timeline:businessTimeline})});
  if(!res) return;
  if(!res.ok){showToast("Failed to send business email","error");return;}
  showToast("Business approval email sent","success");
}

window.incPersonalTimeline=()=>{personalTimeline++;document.getElementById("personalTimelineValue").textContent=personalTimeline;};
window.decPersonalTimeline=()=>{if(personalTimeline>0)personalTimeline--;document.getElementById("personalTimelineValue").textContent=personalTimeline;};
window.incBusinessTimeline=()=>{businessTimeline++;document.getElementById("businessTimelineValue").textContent=businessTimeline;};
window.decBusinessTimeline=()=>{if(businessTimeline>0)businessTimeline--;document.getElementById("businessTimelineValue").textContent=businessTimeline;};
</script>

<script>
/* ── Admin Docs (Returns tab) ── */
async function loadAdminDocs() {
  const panel = document.getElementById("docPanel");
  showSpinner(panel);
  const res = await authFetch(`/api/upload/admin-documents?user_id=${userId}`);
  if (!res||!res.ok){hideSpinner(panel,'<div class="empty-state"><div class="empty-hint">Failed to load documents.</div></div>');return;}
  const docs = await res.json(); panel.innerHTML="";
  if (!docs.length){panel.innerHTML='<div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">inbox</span></div><div class="empty-title">No documents uploaded yet</div></div>';return;}
  docs.forEach(doc=>{
    const item=document.createElement("div"); item.className="panel-item";
    const info=document.createElement("div"); info.className="pi-info";
    const lbl=document.createElement("div");  lbl.className="pi-label"; lbl.textContent=doc.doc_label;
    const fn =document.createElement("div");  fn.className ="pi-fname"; fn.textContent=doc.filename;
    info.appendChild(lbl); info.appendChild(fn);
    const acts=document.createElement("div"); acts.className="admin-doc-actions";
    const vBtn=document.createElement("button"); vBtn.className="btn btn-secondary btn-xs"; vBtn.style.borderRadius="var(--radius-sm)"; vBtn.textContent="View";
    vBtn.addEventListener("click",()=>authFetch(`/api/upload/view-url?key=${encodeURIComponent(doc.storage_key)}`).then(r=>r&&r.json()).then(d=>d&&window.open(d.url,"_blank")).catch(()=>showToast("Could not generate view link","error")));
    const dBtn=document.createElement("button"); dBtn.className="btn btn-danger btn-xs"; dBtn.style.borderRadius="var(--radius-sm)"; dBtn.textContent="Delete";
    dBtn.addEventListener("click",async()=>{const ok=await confirmModal("Delete this admin document?","Delete");if(!ok)return;const dr=await authFetch(`/api/upload/admin-documents/${doc.id}`,{method:"DELETE"});if(!dr)return;showToast("Document deleted","success");loadAdminDocs();});
    acts.appendChild(vBtn); acts.appendChild(dBtn); item.appendChild(info); item.appendChild(acts); panel.appendChild(item);
  });
}

async function _handleAdminDocUpload(file) {
  const btnText=document.getElementById("adminUploadBtnText");
  if(btnText) btnText.textContent="Uploading…";
  const fd=new FormData(); fd.append("file",file); fd.append("doc_key",file.name.toLowerCase().replace(/\s+/g,"_")); fd.append("doc_label",file.name); fd.append("user_id",userId);
  const res=await authFetch("/api/upload/admin-documents",{method:"POST",body:fd});
  if(btnText) btnText.textContent="+ Upload Document";
  if(!res) return;
  if(!res.ok){const e=await res.json().catch(()=>{});showToast(e?.detail||"Upload failed","error");return;}
  showToast("Document uploaded successfully","success"); loadAdminDocs();
}

async function submitDocumentsForReview(){
  const ok=await confirmModal("Submit all documents for review?\nAn email will be sent to the user.","Submit"); if(!ok) return;
  try{
    const res=await authFetch("/api/review/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:userId})}); if(!res) return;
    if(!res.ok){const e=await res.json();showToast(e?.detail||"Failed to submit","error");return;}
    const data=await res.json();
    if(data.email_sent) showToast("Documents submitted — email sent to user.","success");
    else showToast("Documents submitted, but email could not be sent.","warning",6000);
  }catch(e){console.error(e);showToast("Unexpected error. Please try again.","error");}
}



async function deleteUserCompletely(){
  const ok=await confirmModal(`This will permanently delete the user AND ALL their documents.\n\nThis action CANNOT be undone.`,"Delete User"); if(!ok) return;
  const res=await authFetch(`/api/upload/admin/users/${userId}`,{method:"DELETE"}); if(!res) return;
  if(!res.ok){showToast("Failed to delete user","error");return;}
  showToast("User deleted successfully","success"); window.location.href="/admin-dashboard";
}

/* ── Audit Log ── */
async function loadAuditLog(){
  auditLoaded=true;
  const log=document.getElementById("auditLog"); showSpinner(log);
  const res=await authFetch(`/api/auth/admin/audit-logs?user_id=${userId}&limit=30`);
  if(!res||!res.ok){hideSpinner(log,'<div class="empty-state"><div class="empty-hint">Failed to load audit log.</div></div>');return;}
  const entries=await res.json();
  if(!entries.length){hideSpinner(log,'<div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">history</span></div><div class="empty-title">No audit entries found</div></div>');return;}
  const table=document.createElement("table"); table.className="admin-docs-table";
  table.innerHTML=`<thead><tr style="background:#f5f8fb;"><th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;">Time</th><th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;">Action</th><th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;">Target</th><th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;">Detail</th></tr></thead>`;
  const tbody=document.createElement("tbody");
  entries.forEach(e=>{
    const tr=document.createElement("tr"); tr.style.borderBottom="1px solid var(--border)";
    [e.created_at?new Date(e.created_at).toLocaleString():"—",e.action||"—",e.target||"—",e.detail||"—"].forEach(val=>{
      const td=document.createElement("td"); td.className="admin-docs-td"; td.textContent=val; tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); hideSpinner(log,""); log.appendChild(table);
}

/* ── Init ── */
document.addEventListener("DOMContentLoaded",()=>{
  initSessionWarning();
  loadSavedState();
  const savedYear=localStorage.getItem("admin_selected_tax_year");
  buildYearOptions("adminTaxYearSelect",savedYear?parseInt(savedYear):new Date().getFullYear());
  loadUserDetails();
  loadAdminDocs();
  const input=document.getElementById("adminDocInput");
  if(input){
    input.addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;await _handleAdminDocUpload(f);e.target.value="";});
  }
  const label=document.getElementById("adminUploadLabel");
  if(label) label.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();label.click();}});
});
</script>
