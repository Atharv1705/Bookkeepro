<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BookKeepPro | Resend Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/animations.css"/>

  <style>html,body{height:100%;}body{margin:0;}</style>  <script src="/js/theme.js?v=2"></script>
</head>
<body style="margin:0;padding:0;">

<div class="auth-shell page-enter">

  <div class="auth-brand">
    <img class="brand-logo" src="/images/bookkeeppro-logo.webp" alt="BookKeepPro"/>
    <div class="brand-divider"></div>
    <h2>Verify Your Email</h2>
    <p>Check your inbox for the verification link. It expires in 24 hours.</p>
  </div>

  <div class="auth-form-side">
    <div class="auth-box">
      <div style="font-size:40px;margin-bottom:12px;">📧</div>
      <h1>Resend Verification</h1>
      <p class="auth-subtitle">We'll send a new link to your registered email</p>

      <div class="form-group" style="margin-top:24px;">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="input" placeholder="you@example.com"/>
      </div>

      <button class="btn btn-primary w-full" id="resendBtn" onclick="resend()" style="border-radius:var(--radius-sm);">
        Send Verification Link
      </button>

      <div class="auth-links"><a href="/login" class="fancy-link">Back to Sign In</a></div>
    </div>
  </div>

</div>

<script src="/js/toast.js"></script>
<script>
async function resend() {
  const email = document.getElementById("email").value.trim();
  const btn   = document.getElementById("resendBtn");
  if (!email) { showToast("Please enter your email address", "warning"); return; }

  btn.disabled = true; btn.textContent = "Sending…";
  try {
    await fetch("/api/auth/resend-verification", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    showToast("If that email is registered and unverified, a new link has been sent. Check your inbox.", "info", 7000);
    document.getElementById("email").value = "";
  } catch { showToast("Network error. Please try again.", "error"); }
  finally  { btn.disabled = false; btn.textContent = "Send Verification Link"; }
}
</script>
</body>
</html>
