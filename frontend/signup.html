<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BookKeepPro | Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/animations.css"/>

  <style>html,body{height:100%;}body{margin:0;}</style>  <script src="/js/theme.js?v=2"></script>
</head>
<body style="margin:0;padding:0;">

<div class="auth-shell page-enter">

  <div class="auth-brand">
    <img class="brand-logo" src="/images/bookkeeppro-logo.webp" alt="BookKeepPro"/>
    <div class="brand-divider"></div>
    <h2>Join BookKeepPro</h2>
    <p>Create your account to securely upload documents, track reviews, and stay on top of your filings.</p>
  </div>

  <div class="auth-form-side">
    <div class="auth-box">
      <a href="/" class="fancy-link" style="display:inline-block; margin-bottom: 1.5rem; font-size: 0.95rem; font-weight: 500;">&larr; Back to Home</a>
      <h1>Create Account</h1>
      <p class="auth-subtitle">It only takes a minute</p>

      <form id="signupForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input id="name" type="text" class="input" placeholder="Jane Smith" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" type="email" class="input" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <input id="phone" type="tel" class="input" placeholder="+1 (555) 000-0000"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input id="password" type="password" class="input" placeholder="At least 8 characters" required style="padding-right:56px;"/>
            <button type="button" class="password-toggle" id="toggleBtn" onclick="togglePassword()">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="signupBtn" style="border-radius:var(--radius-sm);">
          Create Account
        </button>
        <div class="auth-links">Already have an account? <a href="/login" class="fancy-link">Sign In</a></div>
      </form>
    </div>
  </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/signup.js"></script>
<script src="/js/password-strength.js"></script>
<script src="/js/spinner.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => { initPasswordStrength("password"); });

  document.getElementById("signupForm").onsubmit = async function(e) {
    e.preventDefault();
    const btn = document.getElementById("signupBtn");
    setButtonLoading(btn, true, "Creating account...");
    try { await signupUser(); }
    catch(err) { console.error(err); showToast("Signup failed. Please try again.", "error"); }
    finally { setButtonLoading(btn, false, "Create Account"); }
  };

  function togglePassword() {
    const pwd = document.getElementById("password");
    const btn = document.getElementById("toggleBtn");
    pwd.type = pwd.type === "password" ? "text" : "password";
    btn.textContent = pwd.type === "password" ? "Show" : "Hide";
  }
</script>
</body>
</html>
